html,body{

  color:#333;
  height:100%;

/* Floating Emojis */
.floating{
  position:fixed;
  top:-10%;
  animation:floatUp linear infinite;
  pointer-events:none;
  opacity:0.9;
  z-index:1;
}

@keyframes floatUp{
  from{ transform:translateY(110vh) rotate(0deg); opacity:1; }
  to{ transform:translateY(-10vh) rotate(360deg); opacity:0; }
}

/* Sparkles */
.sparkle{
  position:fixed;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 12px white;
  animation:sparkle 2.5s infinite;
  z-index:1;
}

@keyframes sparkle{
  0%,100%{ opacity:0; transform:scale(0.5); }
  50%{ opacity:1; transform:scale(1.3); }
}

/* Main Container */
.container{

  z-index:2;

  margin:auto;

/* Vinyl */
